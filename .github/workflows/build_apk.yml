name: Build APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.44.2"
          channel: "stable"
          cache: false

      - name: Clean and pub get
        working-directory: ./mobile
        run: |
          rm -rf .dart_tool build .flutter-plugins
          flutter clean
          flutter pub get

      - name: Build APK
        working-directory: ./mobile
        run: flutter build apk --release --target-platform android-arm64

      - name: Upload APK via gh CLI
        run: |
          gh release delete build-${{ github.run_number }} --yes || true
          gh release create build-${{ github.run_number }}             mobile/build/app/outputs/flutter-apk/app-arm64-v8a-release.apk             --draft             --title "Build #${{ github.run_number }}"             --notes "Vega Chat Build"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
