name: vega_chat
description: Vega Chat - AI-powered mobile IDE
version: 0.2.0+2

environment:
  sdk: ^3.4.0

dependencies:
  flutter:
    sdk: flutter
  http: ^1.2.0
  provider: ^6.1.0
  go_router: ^14.0.0
  shared_preferences: ^2.2.0
  flutter_markdown: ^0.7.3
  file_picker: ^8.0.0
  image_picker: ^1.0.0
  path_provider: ^2.1.0
  path: ^1.9.0
  web_socket_channel: ^2.4.0
  open_file_plus: ^3.4.1+1
  url_launcher: ^6.2.0
  speech_to_text: ^7.0.0
  permission_handler: ^11.3.0
  markdown: ^7.2.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.0

flutter:
  uses-material-design: true
  assets:
    - assets/logo.jpg
    - assets/logo.png
